<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>fukidashi 吹き出し</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
/* dialogue lettering: Back Issues BB (Blambot, free indie license) if the
   user has dropped it into frontend/fonts/ — see fonts/README.md — else
   the bundled Komika Text (Apostrophic Labs freeware) */
@font-face {
  font-family: "Back Issues BB"; font-display: swap;
  src: url(/fonts/BackIssuesBB.ttf), url(/fonts/BackIssuesBB.otf);
}
@font-face {
  font-family: "Back Issues BB"; font-weight: 700; font-display: swap;
  src: url(/fonts/BackIssuesBB-Bold.ttf), url(/fonts/BackIssuesBB-Bold.otf);
}
@font-face {
  font-family: "Komika Text"; font-display: swap;
  src: url(/fonts/KomikaText.ttf);
}
@font-face {
  font-family: "Komika Text"; font-weight: 700; font-display: swap;
  src: url(/fonts/KomikaText-Bold.ttf);
}
:root {
  --paper: #f6f1e7;
  --paper-deep: #ece4d2;
  --ink: #1a1714;
  --ink-soft: #55504a;
  --shu: #cc3a2b;          /* vermillion */
  --shu-deep: #a82e21;
  --line: #d8cdb6;
  --room: #14120f;         /* reader surround */
  --serif: "Shippori Mincho", "Hiragino Mincho ProN", serif;
  --sans: "Zen Kaku Gothic New", "Hiragino Sans", sans-serif;
  --letter: "Back Issues BB", "Komika Text", "Comic Sans MS", var(--sans);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: var(--sans);
  color: var(--ink);
  background: var(--paper);
  min-height: 100%;
}
/* halftone dot texture, very faint */
body.library-mode {
  background-image:
    radial-gradient(circle at 1px 1px, rgba(26,23,20,.06) 1px, transparent 0);
  background-size: 14px 14px;
}
button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; }

/* ============ LIBRARY ============ */
#library { max-width: 980px; margin: 0 auto; padding: 40px 24px 96px; }

header.masthead { display: flex; align-items: baseline; gap: 18px; border-bottom: 3px solid var(--ink); padding-bottom: 18px; }
.masthead h1 {
  font-family: var(--serif); font-weight: 800; font-size: clamp(2.4rem, 6vw, 3.6rem);
  letter-spacing: .02em; line-height: 1;
}
.masthead h1 .jp { color: var(--shu); }
.masthead .tag { color: var(--ink-soft); font-size: .95rem; }
#status-chip {
  margin-left: auto; font-size: .8rem; padding: 4px 12px; border: 1.5px solid var(--ink);
  border-radius: 999px; white-space: nowrap;
}
#status-chip.bad { border-color: var(--shu); color: var(--shu); }

/* import panel */
#import-box {
  margin-top: 32px; border: 2px dashed var(--ink-soft); border-radius: 4px;
  padding: 26px; background: rgba(255,255,255,.45);
  display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  transition: border-color .15s, background .15s;
}
#import-box.drag { border-color: var(--shu); background: #fff; }
#import-box .hint { flex-basis: 100%; color: var(--ink-soft); font-size: .9rem; }
#import-box input[type=text] {
  flex: 1 1 220px; padding: 10px 14px; border: 1.5px solid var(--ink);
  background: var(--paper); font-size: 1rem; border-radius: 2px;
}
.btn {
  border: 2px solid var(--ink); background: var(--ink); color: var(--paper);
  padding: 10px 22px; font-size: .95rem; font-weight: 700; border-radius: 2px;
  transition: transform .08s, background .15s;
}
.btn:hover { background: var(--shu); border-color: var(--shu); }
.btn:active { transform: translateY(1px); }
.btn.ghost { background: transparent; color: var(--ink); }
.btn.ghost:hover { background: var(--ink); color: var(--paper); }
.btn:disabled { opacity: .45; cursor: default; }

/* volume cards */
#volumes { margin-top: 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.vol {
  background: #fff; border: 1.5px solid var(--line); border-left: 6px solid var(--ink);
  padding: 20px; border-radius: 3px; box-shadow: 4px 4px 0 rgba(26,23,20,.08);
  display: flex; flex-direction: column; gap: 12px;
}
.vol h3 { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; }
.vol .meta { font-size: .82rem; color: var(--ink-soft); display: flex; gap: 10px; flex-wrap: wrap; }
.pill { border: 1px solid var(--line); border-radius: 999px; padding: 1px 10px; }
.pill.done { border-color: var(--shu); color: var(--shu); font-weight: 700; }
.vol .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.vol input.lang {
  width: 110px; padding: 7px 10px; border: 1.5px solid var(--line); border-radius: 2px;
  background: var(--paper); font-size: .88rem;
}
.vol .btn { padding: 7px 14px; font-size: .85rem; }
.vol .del { margin-left: auto; border: none; background: none; color: var(--ink-soft); font-size: .8rem; }
.vol .del:hover { color: var(--shu); }
.joblog {
  font-size: .78rem; background: var(--ink); color: #cfc8ba; border-radius: 3px;
  padding: 10px 12px; max-height: 130px; overflow-y: auto; font-family: ui-monospace, monospace;
  white-space: pre-wrap; display: none;
}
.joblog.active { display: block; }
.joblog .err { color: #ff8a7a; }
#empty { margin-top: 60px; text-align: center; color: var(--ink-soft); font-family: var(--serif); font-size: 1.1rem; }

/* ============ READER ============ */
#reader { display: none; position: fixed; inset: 0; background: var(--room); color: #e8e2d4; flex-direction: column; }
#reader.open { display: flex; }
#reader-bar {
  display: flex; align-items: center; gap: 14px; padding: 10px 18px;
  background: rgba(0,0,0,.35); border-bottom: 1px solid #2c2822; font-size: .88rem;
}
#reader-bar .title { font-family: var(--serif); font-weight: 700; font-size: 1.05rem; }
#reader-bar .spacer { flex: 1; }
#reader-bar button, #reader-bar select {
  background: none; border: 1px solid #4a443a; color: #e8e2d4; padding: 5px 12px;
  border-radius: 2px; font-size: .82rem;
}
#reader-bar button:hover { border-color: var(--shu); color: #fff; }
#reader-bar button.on { background: var(--shu); border-color: var(--shu); color: #fff; }
#page-ind { font-variant-numeric: tabular-nums; color: #9a928a; }

#stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; padding: 14px; }
/* overflow hidden: masks and lettering may never paint past the page edge */
#page-wrap { position: relative; max-height: 100%; max-width: 100%; box-shadow: 0 0 60px rgba(0,0,0,.7); overflow: hidden; }
#page-img { display: block; max-height: calc(100vh - 90px); max-width: 100%; user-select: none; }

/* long-strip mode: every page in one vertical scroll, manga-site style */
#strip { display: none; }
#reader.strip #page-wrap, #reader.strip .edge { display: none; }
#reader.strip #strip {
  display: block; position: absolute; inset: 0; overflow-y: auto;
  padding: 14px 12px 60px;
}
.strip-page {
  position: relative; width: min(100%, 840px); margin: 0 auto 14px;
  box-shadow: 0 0 40px rgba(0,0,0,.6); overflow: hidden;
}
.strip-page img { display: block; width: 100%; background: #201d18; user-select: none; }

/* typesetting: pages whose bubbles were detected are served pre-cleaned
   (original text painted out server-side) and the translation is lettered
   into the real bubble's inscribed rect. Blocks without a detected bubble
   fall back to a feathered white mask + guessed box. */
.ov-mask {
  position: absolute; background: #fff; border-radius: 50%;
  box-shadow: 0 0 7px 5px #fff; pointer-events: none;
}
.ov-mask.h { border-radius: 32% / 48%; }
.ov {
  position: absolute; display: flex; align-items: center; justify-content: center;
  color: #111; text-align: center; cursor: help;
  font-family: var(--letter);
  /* comic lettering fonts carry their weight at 400; 1.16 leading is the
     lettering norm — tighter reads cramped, looser falls apart in ovals */
  font-weight: 400; line-height: 1.16; letter-spacing: .02em;
  overflow: hidden; border-radius: 8px;
  /* words never split mid-word (bad lettering) — boxes too narrow for
     their longest word get condensed via scaleX in readableFloor instead */
}
.ov span { text-wrap: balance; }
/* the translator marks stressed words as *word*; letter them the way
   comics do — bold italics */
.ov em { font-style: italic; font-weight: 700; }
/* shaped flow: two invisible floats carve everything outside the bubble
   contour out of the line boxes (shape-outside), so text wraps to the
   bubble's own curve — long lines through the belly, short at the crown */
.ov.shaped { display: block; }
.ov.shaped span { text-wrap: wrap; }
.ov.shaped .sp { pointer-events: none; }
.ov.shaped .sp.l { float: left; width: 50%; height: 100%; }
.ov.shaped .sp.r { float: right; width: 50%; height: 100%; }
/* SFX / floating text (no bubble mask found): handwritten, at the source
   text's own spot and proportional to its size — not dialogue lettering */
.ov.sfx {
  display: block; overflow: visible; width: max-content;
  transform: translate(-50%, -50%); border-radius: 0;
  font-family: "Permanent Marker", "Komika Text", cursive; font-weight: 400;
  letter-spacing: .04em; line-height: 1.05;
  text-shadow: -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff,
               2px 2px 0 #fff, 0 0 6px #fff;
}
/* cover pages: stylized title art is never painted out — translations
   ride in small caption chips beside the original text */
.ov.caption {
  display: block; width: max-content; max-width: 44%;
  transform: translate(-50%, 0); border-radius: 6px;
  background: rgba(255,255,255,.93); color: #1a1714;
  padding: .28em .6em; line-height: 1.25; letter-spacing: .01em;
  box-shadow: 0 1px 6px rgba(0,0,0,.35); overflow: visible;
}
.ov:hover { box-shadow: inset 0 0 0 2px var(--shu); z-index: 5; }
.ov.pending { color: transparent; }
.ov.pending + .ov-mask, .ov-mask.pending { opacity: .5; }
#reader.hide-ov .ov, #reader.hide-ov .ov-mask { display: none; }

#orig-tip {
  position: fixed; display: none; max-width: 340px; z-index: 50; pointer-events: none;
  background: var(--ink); color: var(--paper); font-size: .95rem; padding: 10px 14px;
  border-radius: 3px; border-left: 4px solid var(--shu); font-family: var(--serif);
}

.edge { position: absolute; top: 0; bottom: 0; width: 26%; z-index: 3; cursor: pointer; }
.edge.left { left: 0; } .edge.right { right: 0; }
.edge:hover::after {
  content: attr(data-arrow); position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 2rem; color: rgba(232,226,212,.5);
}
.edge.left:hover::after { left: 14px; } .edge.right:hover::after { right: 14px; }

#bible-drawer {
  position: absolute; top: 0; right: 0; bottom: 0; width: min(440px, 92vw);
  background: var(--paper); color: var(--ink); transform: translateX(100%);
  transition: transform .22s ease; padding: 26px; overflow-y: auto; z-index: 20;
  border-left: 4px solid var(--shu); box-shadow: -12px 0 40px rgba(0,0,0,.5);
}
#bible-drawer.open { transform: translateX(0); }
#bible-drawer h2 { font-family: var(--serif); margin-bottom: 4px; }
#bible-drawer .sub { color: var(--ink-soft); font-size: .82rem; margin-bottom: 16px; }
#bible-text { white-space: pre-wrap; font-size: .9rem; line-height: 1.55; }
#bible-text em { font-style: italic; font-weight: 700; }

#toast {
  position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
  background: var(--ink); color: var(--paper); padding: 10px 20px; border-radius: 3px;
  border-left: 4px solid var(--shu); display: none; z-index: 99; font-size: .9rem;
}
</style>
</head>
<body class="library-mode">

<div id="library">
  <header class="masthead">
    <h1>fukidashi <span class="jp">吹き出し</span></h1>
    <span class="tag">context-aware manga translation</span>
    <span id="status-chip">checking…</span>
  </header>

  <div id="import-box">
    <span class="hint">Drop a <b>.cbz / .zip</b> of page images here (or browse), name it, and import.</span>
    <input type="file" id="file-in" accept=".cbz,.zip" hidden>
    <button class="btn ghost" id="browse-btn">Browse…</button>
    <span id="file-name" style="color:var(--ink-soft);font-size:.9rem">no file selected</span>
    <input type="text" id="title-in" placeholder="Title (e.g. Yotsuba&! v01)">
    <button class="btn" id="import-btn">Import</button>
  </div>

  <div id="volumes"></div>
  <div id="empty" hidden>The shelf is empty. Import a volume to begin.<br>本棚は空です</div>
</div>

<div id="reader">
  <div id="reader-bar">
    <button id="back-btn">← Library</button>
    <span class="title" id="reader-title"></span>
    <span class="spacer"></span>
    <select id="lang-sel" title="translation language"></select>
    <button id="mode-btn" title="toggle long-strip view (v)">Long strip</button>
    <button id="ov-btn" class="on" title="toggle translations (t)">Translation</button>
    <button id="bible-btn" title="story bible (b)">Bible</button>
    <button id="dl-btn" title="download the typeset pages as a zip of images">⤓ ZIP</button>
    <span id="page-ind"></span>
  </div>
  <div id="stage">
    <div class="edge right" data-arrow="‹" title="previous page"></div>
    <div class="edge left" data-arrow="›" title="next page"></div>
    <div id="page-wrap">
      <img id="page-img" alt="manga page">
    </div>
    <div id="strip"></div>
    <div id="bible-drawer">
      <h2>Story bible 設定資料</h2>
      <div class="sub">built by the context pass before translation</div>
      <div id="bible-text"></div>
    </div>
  </div>
</div>

<div id="orig-tip"></div>
<div id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const api = (p, opts) => fetch(p, opts).then(async r => {
  if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
  return r.json();
});
function toast(msg, ms = 3200) {
  const t = $('#toast'); t.textContent = msg; t.style.display = 'block';
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = 'none', ms);
}

/* ---------- status ---------- */
async function refreshStatus() {
  const chip = $('#status-chip');
  try {
    const s = await api('/api/status');
    if (!s.ollama) { chip.textContent = '⚠ Ollama offline'; chip.className = 'bad'; }
    else if (!s.model_present) { chip.textContent = `⚠ ${s.model} not pulled`; chip.className = 'bad'; }
    else { chip.textContent = `● ${s.model}`; chip.className = ''; }
  } catch { chip.textContent = '⚠ server?'; chip.className = 'bad'; }
}

/* ---------- library ---------- */
async function loadLibrary() {
  const vols = await api('/api/volumes');
  $('#empty').hidden = vols.length > 0;
  const box = $('#volumes'); box.innerHTML = '';
  for (const v of vols) box.appendChild(volCard(v));
}

function volCard(v) {
  const el = document.createElement('div');
  el.className = 'vol';
  const langPills = v.languages.map(l => `<span class="pill done">${l}</span>`).join('');
  el.innerHTML = `
    <h3>${esc(v.title)}</h3>
    <div class="meta">
      <span>${v.page_count} pages</span>
      <span class="pill ${v.ocr_done ? 'done' : ''}">${v.ocr_done ? 'OCR ✓' : 'not OCR’d'}</span>
      ${langPills}
    </div>
    <div class="row">
      <input class="lang" value="English" title="target language">
      <button class="btn translate">Translate</button>
      <label style="font-size:.78rem;color:var(--ink-soft)" title="redo everything from scratch — OCR, bubbles, bible and all translations — e.g. after a model or detector change">
        <input type="checkbox" class="force"> redo</label>
      ${v.languages.map(l => `<button class="btn ghost read" data-lang="${esc(l)}">Read · ${esc(l)}</button>`).join('')}
      <button class="del" title="delete volume">delete</button>
    </div>
    <div class="joblog"></div>`;
  // a job survives the browser closing (it lives in the server); re-attach
  // the progress log for running jobs, and for failed ones so the error
  // is still readable after a reload
  if (v.job && (v.job.running || v.job.error)) attachLog(v.slug, el);
  el.querySelector('.translate').onclick = () => startJob(v.slug, el);
  el.querySelectorAll('.read').forEach(b => b.onclick = () => openReader(v.slug, b.dataset.lang));
  el.querySelector('.del').onclick = async () => {
    if (!confirm(`Delete "${v.title}"?`)) return;
    await api(`/api/volumes/${v.slug}`, { method: 'DELETE' });
    loadLibrary();
  };
  return el;
}

async function startJob(slug, card) {
  const lang = card.querySelector('.lang').value.trim() || 'English';
  const btn = card.querySelector('.translate');
  btn.disabled = true;
  try {
    const fd = new FormData(); fd.append('language', lang);
    if (card.querySelector('.force').checked) fd.append('force', 'true');
    await api(`/api/volumes/${slug}/translate`, { method: 'POST', body: fd });
  } catch (e) { toast(e.message); btn.disabled = false; return; }
  attachLog(slug, card);
}

/* stream a job's progress into the card's log; the server replays the
   whole event history on connect, so this also restores logs after a
   page reload (jobs die with the server process, not the browser) */
const _logStreams = {};
function attachLog(slug, card) {
  if (_logStreams[slug]) _logStreams[slug].close();
  const log = card.querySelector('.joblog');
  const btn = card.querySelector('.translate');
  btn.disabled = true;
  log.classList.add('active'); log.textContent = '';
  const es = _logStreams[slug] = new EventSource(`/api/volumes/${slug}/progress`);
  es.onmessage = ev => {
    const d = JSON.parse(ev.data);
    if (d.done !== undefined) {
      es.close(); delete _logStreams[slug]; btn.disabled = false;
      if (d.error) { log.innerHTML += `<span class="err">${esc(d.error)}</span>`; }
      else loadLibrary();  // no re-attach loop: finished jobs aren't running/error
      return;
    }
    log.textContent += d.message + '\n';
    log.scrollTop = log.scrollHeight;
  };
  es.onerror = () => { es.close(); delete _logStreams[slug]; btn.disabled = false; };
}

/* ---------- import ---------- */
let pickedFile = null;
$('#browse-btn').onclick = () => $('#file-in').click();
$('#file-in').onchange = e => setFile(e.target.files[0]);
const ib = $('#import-box');
ib.ondragover = e => { e.preventDefault(); ib.classList.add('drag'); };
ib.ondragleave = () => ib.classList.remove('drag');
ib.ondrop = e => {
  e.preventDefault(); ib.classList.remove('drag');
  setFile(e.dataTransfer.files[0]);
};
function setFile(f) {
  if (!f) return;
  pickedFile = f;
  $('#file-name').textContent = f.name;
  if (!$('#title-in').value) $('#title-in').value = f.name.replace(/\.(cbz|zip)$/i, '');
}
$('#import-btn').onclick = async () => {
  if (!pickedFile) return toast('pick a .cbz first');
  const title = $('#title-in').value.trim();
  if (!title) return toast('give it a title');
  const fd = new FormData();
  fd.append('file', pickedFile); fd.append('title', title);
  try {
    await api('/api/import', { method: 'POST', body: fd });
    pickedFile = null; $('#file-name').textContent = 'no file selected'; $('#title-in').value = '';
    loadLibrary();
  } catch (e) { toast(e.message); }
};

/* ---------- reader ---------- */
const R = { slug: null, data: null, page: 0, lang: 'English',
            mode: localStorage.getItem('fukidashi-view') || 'single' };

async function openReader(slug, lang) {
  R.slug = slug; R.lang = lang;
  R.data = await api(`/api/volumes/${slug}/reader?language=${encodeURIComponent(lang)}`);
  R.page = 0;
  $('#reader-title').textContent = R.data.title;
  setLetteringText($('#bible-text'), R.data.bible || '(no bible yet)');
  const sel = $('#lang-sel');
  sel.innerHTML = '';
  const vols = await api('/api/volumes');
  const langs = (vols.find(v => v.slug === slug) || {}).languages || [lang];
  for (const l of langs) {
    const o = document.createElement('option');
    o.value = o.textContent = l; if (l === lang) o.selected = true;
    sel.appendChild(o);
  }
  document.body.classList.remove('library-mode');
  $('#reader').classList.add('open');
  applyMode();
}
$('#lang-sel').onchange = e => openReader(R.slug, e.target.value);

/* Show the cleaned (text-erased) page only when every block on it has a
   translation to letter in — otherwise readers would face empty bubbles.
   With translations toggled off, always show the untouched original. */
function fullyTranslated(n) {
  const p = R.data.pages[n];
  return p && p.blocks.length > 0 && p.blocks.every(b => b.translation != null);
}
function useCleaned(n, ignoreToggle = false) {
  const p = R.data.pages[n];
  // cover pages always show the untouched art — captions go on top
  return (ignoreToggle || !$('#reader').classList.contains('hide-ov')) &&
         p && !p.cover && fullyTranslated(n);
}
function pageSrc(n, ignoreToggle = false) {
  return `/api/volumes/${R.slug}/${useCleaned(n, ignoreToggle) ? 'cleaned' : 'pages'}/${n}`;
}

/* mode: 'single' (one page, edge/arrow nav) or 'strip' (all pages in one
   vertical scroll) — the two views manga sites offer */
function applyMode() {
  const strip = R.mode === 'strip';
  $('#reader').classList.toggle('strip', strip);
  $('#mode-btn').classList.toggle('on', strip);
  $('#strip').innerHTML = '';
  if (strip) { buildStrip(); jumpStrip(R.page, false); updateInd(); }
  else showPage(R.page);
}
function toggleMode() {
  R.mode = R.mode === 'strip' ? 'single' : 'strip';
  localStorage.setItem('fukidashi-view', R.mode);
  applyMode();
}

function updateInd() {
  $('#page-ind').textContent = `${R.page + 1} / ${R.data.page_count}`;
}

/* one placeholder per page (correct aspect ratio, so scroll geometry is
   stable); images load and letter themselves as they near the viewport */
function buildStrip() {
  const box = $('#strip');
  for (let n = 0; n < R.data.page_count; n++) {
    const p = R.data.pages[n];
    const d = document.createElement('div');
    d.className = 'strip-page'; d.dataset.n = n;
    const img = document.createElement('img');
    img.alt = `page ${n + 1}`;
    img.style.aspectRatio = p && p.width ? `${p.width} / ${p.height}` : '7 / 10';
    d.appendChild(img);
    box.appendChild(d);
    stripIO.observe(d);
  }
}
const stripIO = new IntersectionObserver(entries => {
  for (const e of entries) {
    if (!e.isIntersecting) continue;
    stripIO.unobserve(e.target);
    const n = +e.target.dataset.n, img = e.target.firstChild;
    img.onload = () => renderOverlays(e.target, n);
    img.src = pageSrc(n);
  }
}, { root: $('#strip'), rootMargin: '200% 0%' });

function jumpStrip(n, smooth = true) {
  const d = $('#strip').children[n];
  if (d) d.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto', block: 'start' });
}

/* the page indicator follows whichever page crosses mid-viewport */
$('#strip').onscroll = () => {
  const box = $('#strip');
  const mid = box.scrollTop + box.clientHeight / 2;
  let n = 0;
  for (const d of box.children) {
    if (d.offsetTop > mid) break;
    n = +d.dataset.n;
  }
  if (n !== R.page) { R.page = n; updateInd(); }
};

function nav(delta) {
  if (R.mode === 'strip') {
    R.page = Math.max(0, Math.min(R.page + delta, R.data.page_count - 1));
    updateInd();
    jumpStrip(R.page);
  } else showPage(R.page + delta);
}

function showPage(n) {
  const d = R.data;
  R.page = Math.max(0, Math.min(n, d.page_count - 1));
  updateInd();
  const img = $('#page-img');
  img.src = pageSrc(R.page);
  document.querySelectorAll('#page-wrap .ov, #page-wrap .ov-mask').forEach(o => o.remove());
  img.onload = () => renderOverlays($('#page-wrap'), R.page);
  // preload neighbours
  for (const k of [R.page + 1, R.page - 1])
    if (k >= 0 && k < d.page_count) new Image().src = pageSrc(k);
}

function renderOverlays(wrap, n, forExport = false) {
  const page = R.data.pages[n];
  if (!page || !page.width) return;
  const cleaned = useCleaned(n, forExport);
  wrap.querySelectorAll('.ov, .ov-mask').forEach(o => o.remove());
  const pct = (v, total) => (v / total * 100) + '%';
  const place = (el, x, y, w, h) => {
    el.style.left = pct(x, page.width);
    el.style.top = pct(y, page.height);
    el.style.width = pct(w, page.width);
    el.style.height = pct(h, page.height);
  };
  if (page.cover) {
    // cover art (stylized title lettering) is never masked or replaced:
    // each translated block gets a small caption chip beside the original
    for (const b of page.blocks) {
      if (b.translation == null) continue;
      const ov = captionOverlay(b, page);
      wrap.appendChild(ov);
      ov._refit();
    }
    return;
  }
  for (const b of page.blocks) {
    // detected bubble on a cleaned page: the original text is already
    // erased server-side — flow into the bubble's actual shape when we
    // have its cross-sections, else letter into the inscribed rect.
    // (whiteish entries carry no rect: they take the label path below)
    if (cleaned && b.bubble && (Array.isArray(b.bubble) || b.bubble.rect)) {
      const bub = Array.isArray(b.bubble) ? { rect: b.bubble } : b.bubble;
      if (bub.chords && bub.chords.length >= 3) {
        const ov = shapedOverlay(b, bub.chords, place);
        wrap.appendChild(ov);
        ov._refit();
        continue;
      }
      const [bx1, by1, bx2, by2] = bub.rect;
      const ov = document.createElement('div');
      ov.className = 'ov';
      place(ov, bx1, by1, bx2 - bx1, by2 - by1);
      setLetteringText(ov.appendChild(document.createElement('span')), b.translation);
      ov.onmousemove = e => showTip(e, b.text);
      ov.onmouseleave = hideTip;
      wrap.appendChild(ov);
      ov._refit = () => fitText(ov);
      ov._refit();
      continue;
    }

    // fallback (no bubble found, or page not fully translated yet):
    // feathered white mask over the original + guessed label box
    const [x1, y1, x2, y2] = b.box;
    const bw = x2 - x1, bh = y2 - y1, cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;

    const mask = document.createElement('div');
    mask.className = 'ov-mask' + (b.vertical ? '' : ' h') +
                     (b.translation == null ? ' pending' : '');
    place(mask, x1, y1, bw, bh);
    wrap.appendChild(mask);

    // fully-translated page, no bubble, and NOT sitting on paper-white:
    // it's SFX / floating text drawn over art, not dialogue — handwritten
    // lettering at the source spot, sized like the source glyphs.
    // (whiteish blocks — open/spiky bubbles the detector couldn't
    // validate — fall through to the masked label instead)
    if (cleaned && !b.bubble) {
      const ov = sfxOverlay(b, page);
      wrap.appendChild(ov);
      ov._refit();
      continue;
    }

    // label: English is horizontal, so vertical JP columns (tall+narrow)
    // get a wider box centered on the bubble; clamp to the page.
    let lw = bw, lh = bh;
    if (b.vertical && bh > bw) {
      lw = Math.min(bw * 2.8, bh * 1.4, page.width * 0.45);
      lh = bh * 0.9;
    }
    let lx = Math.max(6, Math.min(cx - lw / 2, page.width - lw - 6));
    let ly = Math.max(6, Math.min(cy - lh / 2, page.height - lh - 6));
    // the widened label must not trample neighbouring text: pull it back
    // toward the source box until it clears every other block on the page
    const others = page.blocks.filter(o => o !== b).map(o => o.box);
    const hits = () => others.some(([ox1, oy1, ox2, oy2]) =>
      lx < ox2 && lx + lw > ox1 && ly < oy2 && ly + lh > oy1);
    while (lw > bw + 1 && hits()) {
      lw = Math.max(bw, lw * 0.88);
      lx = Math.max(6, Math.min(cx - lw / 2, page.width - lw - 6));
    }
    // the label often reaches past the source column's mask (horizontal
    // English over a vertical JP strip): white out the label's own
    // footprint too, so lettering always sits on paper, never on art
    let m2 = null;
    if (b.translation != null) {
      m2 = document.createElement('div');
      m2.className = 'ov-mask h';
      wrap.appendChild(m2);
    }
    const ov = document.createElement('div');
    ov.className = 'ov' + (b.translation == null ? ' pending' : '');
    setLetteringText(ov.appendChild(document.createElement('span')), b.translation ?? '');
    ov.onmousemove = e => showTip(e, b.text);
    ov.onmouseleave = hideTip;
    wrap.appendChild(ov);
    // the white backdrop readers actually see is the mask's inscribed
    // ellipse (the export draws exactly that), so the lettering must fit
    // the ellipse, not the label rectangle — a full rect's corners would
    // sit on art outside the white
    if (m2) ov._contain = rects => insideEllipse(rects, m2.getBoundingClientRect());
    // this "bubble" is our own white mask, so a text that can't fit at
    // readable size grows the label (and the mask with it) over more
    // art instead of shrinking or clipping — stopping short of
    // trampling a neighbouring block
    const lh0 = lh, ly0 = ly;
    const placeLabel = () => {
      place(ov, lx, ly, lw, lh);
      if (m2) place(m2, lx - lw * 0.06, ly - lh * 0.06, lw * 1.12, lh * 1.12);
    };
    ov._refit = () => {
      lh = lh0; ly = ly0;
      placeLabel();
      fitText(ov);
      for (let g = 0; g < 4 && parseFloat(ov.style.fontSize) < 10; g++) {
        const nlh = Math.min(page.height * 0.6, lh * 1.35);
        const nly = Math.max(6, Math.min(cy - nlh / 2, page.height - nlh - 6));
        if (others.some(([ox1, oy1, ox2, oy2]) =>
              lx < ox2 && lx + lw > ox1 && nly < oy2 && nly + nlh > oy1)) break;
        lh = nlh; ly = nly;
        placeLabel();
        fitText(ov);
      }
    };
    ov._refit();
  }
  resolveSfxCollisions(wrap);
}

/* final sweep after a page letters itself: SFX text is the only overlay
   free to roam, so if its rendered extent intersects any other
   overlay's, shrink it until everything reads cleanly — no overlap */
function resolveSfxCollisions(wrap) {
  const others = [...wrap.querySelectorAll('.ov:not(.sfx)')];
  for (const s of wrap.querySelectorAll('.ov.sfx')) {
    for (let i = 0; i < 5; i++) {
      const r = s.getBoundingClientRect();
      const hit = others.some(o => {
        const q = o.getBoundingClientRect();
        return r.left < q.right && r.right > q.left &&
               r.top < q.bottom && r.bottom > q.top;
      });
      if (!hit) break;
      const cur = parseFloat(s.style.fontSize) || 14;
      if (cur <= 11) break;
      s.style.fontSize = Math.max(11, cur * 0.82) + 'px';
      if (s._syncMask) s._syncMask();
    }
  }
}

/* cover caption: a chip hung just below the source text (above it when
   the text sits at the page bottom), sized to the page, art untouched */
function captionOverlay(b, page) {
  const [x1, y1, x2, y2] = b.box;
  const ov = document.createElement('div');
  ov.className = 'ov caption';
  ov.style.left = ((x1 + x2) / 2 / page.width * 100) + '%';
  const gap = 0.012 * page.height;
  const below = y2 + gap < page.height * 0.97;
  ov.style.top = ((below ? y2 + gap : y1 - gap) / page.height * 100) + '%';
  if (!below) ov.style.transform = 'translate(-50%, -100%)';
  setLetteringText(ov.appendChild(document.createElement('span')), b.translation);
  ov._refit = () => {
    const img = ov.parentElement && ov.parentElement.querySelector('img');
    if (!img) return;
    ov.style.fontSize = Math.max(10, Math.min(18, img.clientWidth * 0.022)) + 'px';
    // a chip centered on text near the page edge would hang off it
    ov.style.marginLeft = '';
    const r = ov.getBoundingClientRect(), pr = img.getBoundingClientRect();
    if (r.left < pr.left + 4) ov.style.marginLeft = (pr.left + 4 - r.left) + 'px';
    else if (r.right > pr.right - 4) ov.style.marginLeft = (pr.right - 4 - r.right) + 'px';
  };
  ov.onmousemove = e => showTip(e, b.text);
  ov.onmouseleave = hideTip;
  return ov;
}

function sfxOverlay(b, page) {
  const [x1, y1, x2, y2] = b.box;
  const ov = document.createElement('div');
  ov.className = 'ov sfx';
  setLetteringText(ov.appendChild(document.createElement('span')), b.translation);
  // proportional size: approximate source glyph size from box area per char
  const chars = Math.max(1, [...b.text].length);
  const pgFont = Math.sqrt((x2 - x1) * (y2 - y1) / chars);
  const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2;
  const neighbors = page.blocks.filter(o => o !== b).map(o => o.box);
  ov._refit = () => {
    // scale off this overlay's own page image (strip mode has many)
    const img = ov.parentElement && ov.parentElement.querySelector('img');
    if (!img) return;
    const scale = img.clientWidth / page.width;
    // stay near the source cluster's own footprint — like a letterer
    // would: wrap (or shrink, for one unbreakable word) to roughly the
    // source's width, so the text centres where the JP was instead of
    // sprawling into a page-edge clamp
    const budget = Math.min(0.55 * page.width,
                            Math.max(1.3 * (x2 - x1), 0.22 * page.width));
    ov.style.maxWidth = budget / page.width * 100 + '%';
    let size = Math.max(11, Math.min(64, pgFont * scale * 0.95));
    // an unbreakable word overflows the CSS cap invisibly to offsetWidth
    // — measure the real glyph extent and pre-shrink to the budget
    ov.style.fontSize = size + 'px';
    const w0 = Math.max(ov.offsetWidth, ov.scrollWidth) / scale;
    if (w0 > budget) size = Math.max(12, size * budget / w0);
    for (;;) {
      ov.style.fontSize = size + 'px';
      const [w, h, mcx, mcy] = ov._syncMask();
      const rx1 = mcx - w / 2, ry1 = mcy - h / 2;
      // big lettering must not trample neighbouring text: shrink until
      // the extent clears every other block on the page
      if (size <= 12 || !neighbors.some(([ox1, oy1, ox2, oy2]) =>
            rx1 < ox2 && rx1 + w > ox1 && ry1 < oy2 && ry1 + h > oy1)) break;
      size *= 0.85;
    }
  };
  // position the text (page-clamped) and keep the white extent-mask
  // glued to it — the English is usually wider than the vertical JP it
  // replaces, and no word may ever sit directly on art
  ov._syncMask = () => {
    const img = ov.parentElement && ov.parentElement.querySelector('img');
    if (!img) return [0, 0, 0, 0];
    const scale = img.clientWidth / page.width;
    // measure the rendered glyph rects, not the layout box: display
    // fonts (Permanent Marker) carry em boxes well past the 1.05
    // line-height, so offsetHeight undersizes the mask by ~40%
    const rl = lineRects(ov.querySelector('span'));
    const w = (rl.length
      ? Math.max(...rl.map(r => r.right)) - Math.min(...rl.map(r => r.left))
      : Math.max(ov.offsetWidth, ov.scrollWidth)) / scale;
    const h = (rl.length
      ? Math.max(...rl.map(r => r.bottom)) - Math.min(...rl.map(r => r.top))
      : ov.offsetHeight) / scale;
    // real breathing room off the page edge — touching it reads as clipped
    const M = Math.max(14, 0.012 * page.width);
    const mcx = Math.max(M + w / 2, Math.min(cx, page.width - M - w / 2));
    const mcy = Math.max(M + h / 2, Math.min(cy, page.height - M - h / 2));
    ov.style.left = mcx / page.width * 100 + '%';
    ov.style.top = mcy / page.height * 100 + '%';
    if (!ov._m2 && ov.parentElement) {
      ov._m2 = document.createElement('div');
      ov._m2.className = 'ov-mask h';
      ov.parentElement.insertBefore(ov._m2, ov);
    }
    if (ov._m2) {
      // the ellipse inscribed in the mask box must contain the text's
      // corners: (0.5/(mw/2w))² + (0.5/(mh/2h))² ≤ 1 — 1.32/1.55 lands
      // at 0.99; the old 1.15/1.35 left every corner outside the white
      const mw = w * 1.32, mh = h * 1.55;
      Object.assign(ov._m2.style, {
        left: (mcx - mw / 2) / page.width * 100 + '%',
        top: (mcy - mh / 2) / page.height * 100 + '%',
        width: mw / page.width * 100 + '%',
        height: mh / page.height * 100 + '%',
      });
    }
    return [w, h, mcx, mcy];
  };
  ov.onmousemove = e => showTip(e, b.text);
  ov.onmouseleave = hideTip;
  return ov;
}

/* Build a shaped overlay over the chords' bounding box. ov._shape(shelfPct)
   (re)generates the two float polygons; rows above the shelf are fully
   excluded, which is how fitShaped pushes text down to centre it. */
function shapedOverlay(b, chords, place) {
  const x1 = Math.min(...chords.map(c => c[1])), x2 = Math.max(...chords.map(c => c[2]));
  const y1 = chords[0][0], y2 = chords[chords.length - 1][0];
  const ov = document.createElement('div');
  ov.className = 'ov shaped';
  place(ov, x1, y1, x2 - x1, y2 - y1);
  const l = document.createElement('div'), r = document.createElement('div');
  l.className = 'sp l'; r.className = 'sp r';
  const span = document.createElement('span');
  setLetteringText(span, b.translation);
  ov.append(l, r, span);
  const W = x2 - x1, H = y2 - y1, half = W / 2;
  const clamp = v => Math.max(0, Math.min(100, v));
  // breathing room: pull each row off the bubble wall proportionally to
  // the bubble's size (the server's fixed-px erosion is nothing on a
  // high-res scan), but never past the row's own midline
  const inset = 0.035 * W;
  const pts = chords.map(([y, xl, xr]) => {
    const il = Math.min(xl + inset, (xl + xr) / 2 - 4);
    const ir = Math.max(xr - inset, (xl + xr) / 2 + 4);
    return [(y - y1) / H * 100,
      clamp((il - x1) / half * 100), clamp((ir - x1 - half) / half * 100)];
  });
  ov._shape = shelfPct => {
    // a shelf excludes the full width above shelfPct (vertical centering);
    // the contour is interpolated at the shelf line so any shelf height
    // works, not just multiples of the chord spacing
    let rows = pts;
    if (shelfPct > 0) {
      const i = pts.findIndex(p => p[0] >= shelfPct);
      rows = i < 0 ? [pts[pts.length - 1]] : pts.slice(i);
      if (i > 0) {
        const [y0, l0, r0] = pts[i - 1], [y1_, l1, r1] = pts[i];
        const t = (shelfPct - y0) / (y1_ - y0);
        rows = [[shelfPct, l0 + (l1 - l0) * t, r0 + (r1 - r0) * t], ...rows];
      }
    }
    const f = v => v.toFixed(2);
    const lp = ['0% 0%'], rp = ['100% 0%'];
    if (shelfPct > 0) {
      lp.push('100% 0%', `100% ${f(rows[0][0])}%`);
      rp.push('0% 0%', `0% ${f(rows[0][0])}%`);
    }
    for (const [yp, xl, xr] of rows) {
      lp.push(`${f(xl)}% ${f(yp)}%`);
      rp.push(`${f(xr)}% ${f(yp)}%`);
    }
    lp.push('0% 100%'); rp.push('100% 100%');
    l.style.shapeOutside = `polygon(${lp.join(',')})`;
    r.style.shapeOutside = `polygon(${rp.join(',')})`;
  };
  // the inset contour, interpolated at any height — the containment
  // oracle behind the floats: shape-outside only *suggests* the region,
  // an unbreakable word overflows it silently and pokes through the
  // bubble wall (worst at the narrow crown/base rows)
  const xAt = yp => {
    if (yp <= pts[0][0]) return pts[0];
    for (let i = 1; i < pts.length; i++)
      if (yp <= pts[i][0]) {
        const [y0, l0, r0] = pts[i - 1], [yn, ln, rn] = pts[i];
        const t = (yp - y0) / (yn - y0 || 1);
        return [yp, l0 + (ln - l0) * t, r0 + (rn - r0) * t];
      }
    return pts[pts.length - 1];
  };
  ov._contain = rects => {
    const o = ov.getBoundingClientRect();
    if (!o.height) return true;
    return rects.every(q => {
      const a = xAt((q.top - o.top) / o.height * 100);
      const c = xAt((q.bottom - o.top) / o.height * 100);
      const xl = o.left + Math.max(a[1], c[1]) / 100 * o.width / 2;
      const xr = o.left + o.width / 2 + Math.min(a[2], c[2]) / 100 * o.width / 2;
      return q.left >= xl - 2 && q.right <= xr + 2;
    });
  };
  ov.onmousemove = e => showTip(e, b.text);
  ov.onmouseleave = hideTip;
  ov._refit = () => fitShaped(ov);
  return ov;
}

/* lettering text: translations mark stressed words as *word* (models
   sometimes write **word** or ***word***) — render every variant as
   <em> (bold italic, the comic convention); asterisks are never shown.
   Unpaired asterisks stay as-is */
function setLetteringText(span, text) {
  span.textContent = '';
  const s = String(text);
  const re = /(\*{1,3})([^*\n]+)\1/g;
  let last = 0, m;
  while ((m = re.exec(s))) {
    if (m.index > last)
      span.appendChild(document.createTextNode(s.slice(last, m.index)));
    const em = document.createElement('em');
    em.textContent = m[2];
    span.appendChild(em);
    last = m.index + m[0].length;
  }
  if (last < s.length) span.appendChild(document.createTextNode(s.slice(last)));
}

/* client rects of the rendered text lines — the span's own box lies about
   width (flex items stretch, floats inset), the line fragments don't */
function lineRects(span) {
  const range = document.createRange();
  range.selectNodeContents(span);
  return [...range.getClientRects()];
}

/* Line rects span the font's full bounding box, and comic lettering
   fonts pad that far past the glyph ink (~1.3-1.45em against the 1.16
   leading) — fitting dialogue to raw rects shrinks text that never
   actually touches the bubble. Shave the measured ink gap off the
   vertical edges of each line rect; horizontal advance widths are
   already ink-accurate. */
const _mctx = document.createElement('canvas').getContext('2d');
function inkRects(span) {
  const rects = lineRects(span);
  if (!rects.length) return rects;
  const cs = getComputedStyle(span);
  _mctx.font = `${cs.fontStyle} ${cs.fontWeight} ${cs.fontSize} ${cs.fontFamily}`;
  const m = _mctx.measureText(span.textContent);
  const t = Math.max(0, m.fontBoundingBoxAscent - m.actualBoundingBoxAscent);
  const b = Math.max(0, m.fontBoundingBoxDescent - m.actualBoundingBoxDescent);
  return rects.map(r => ({ left: r.left, right: r.right,
                           top: r.top + t, bottom: r.bottom - b }));
}

/* undo a previous fit's rescue styling so refits start clean */
function resetFit(ov) {
  ov.style.transform = ''; delete ov.dataset.condense;
  ov.style.overflow = ''; ov.style.zIndex = '';
}

function fitShaped(ov) {
  // same binary search as fitText; vertical overflow shows up as content
  // pushed below the full-height floats, i.e. scrollHeight growth, and a
  // word too wide for its row sticks out horizontally — narrow vertical
  // bubbles hit this with short exclamations, so lines must also stay
  // inside the region's own edges; the wrapped text's bbox is capped at
  // ~76% of the region area
  const span = ov.lastElementChild;
  resetFit(ov);
  ov._shape(0);
  let lo = 7, hi = Math.min(52, Math.round(ov.clientHeight * 0.8));
  const fits = s => {
    ov.style.fontSize = s + 'px';
    if (ov.scrollHeight > ov.clientHeight + 0.5) return false;
    // ink rects, not raw: dialogue must fill the bubble like a letterer
    // would — only real glyph ink crossing the region or its contour
    // rejects a size, never the font's padded em box
    const rects = inkRects(span);
    if (rects.length) {
      const o = ov.getBoundingClientRect();
      if (Math.max(...rects.map(q => q.right)) > o.right + 1 ||
          Math.min(...rects.map(q => q.left)) < o.left - 1 ||
          Math.min(...rects.map(q => q.top)) < o.top - 1 ||
          Math.max(...rects.map(q => q.bottom)) > o.bottom + 1) return false;
      if (!ov._contain(rects)) return false;
    }
    const r = span.getBoundingClientRect();
    return r.width * r.height <= 0.76 * ov.clientWidth * ov.clientHeight + 0.5;
  };
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2);
    if (fits(mid)) lo = mid; else hi = mid - 1;
  }
  ov.style.fontSize = readableFloor(ov, lo) + 'px';
  // centre vertically: shelf text down to the middle of the leftover
  // space; convex bubbles only widen toward the middle so this almost
  // always still fits — back off by halves when it doesn't
  const used = span.getBoundingClientRect().bottom - ov.getBoundingClientRect().top;
  let shelf = Math.max(0, (ov.clientHeight - used) / 2 / ov.clientHeight * 100);
  for (; shelf >= 1; shelf /= 2) {
    ov._shape(shelf);
    // shelving reflows the text into lower (often narrower) rows —
    // recheck the contour, not just the height
    if (ov.scrollHeight <= ov.clientHeight + 0.5 &&
        ov._contain(inkRects(span))) return;
  }
  ov._shape(0);
}

function fitText(ov) {
  // largest size (binary search) whose wrapped-text bbox fills ~77% of
  // the label box (0.88 per axis ≈ 77% by area) — measured on the inner
  // span: scrollHeight misses content that a centered flexbox pushes
  // past the TOP edge, which clipped first lines
  const span = ov.firstElementChild;
  resetFit(ov);
  let lo = 7, hi = Math.min(52, Math.round(ov.clientHeight * 0.8));
  const fits = s => {
    ov.style.fontSize = s + 'px';
    // measure the rendered lines, not the span box: a wrapped flex item
    // stretches to the container width even when balanced lines are short
    const rects = lineRects(span);
    if (!rects.length) return true;
    const w = Math.max(...rects.map(r => r.width));
    const h = Math.max(...rects.map(r => r.bottom)) - Math.min(...rects.map(r => r.top));
    if (h > ov.clientHeight * 0.88 + 0.5 || w > ov.clientWidth * 0.88 + 0.5) return false;
    return !ov._contain || ov._contain(rects);
  };
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2);
    if (fits(mid)) lo = mid; else hi = mid - 1;
  }
  ov.style.fontSize = readableFloor(ov, lo) + 'px';
}

/* a fit that bottomed out below readable size means the region is too
   small for the text. Text must NEVER escape its bubble: condense the
   type (scaleX, like a letterer) so the widest word fits, and if it
   still overflows vertically keep shrinking below the 10px comfort
   floor — small-but-inside beats readable-but-bleeding over the art.
   Whatever can't fit even at 5px condensed is clipped — in practice
   unreachable; the original is always a hover away. */
function readableFloor(ov, size) {
  if (size >= 10) return size;
  const span = ov.querySelector('span');
  for (let s = 10; s >= 5; s--) {
    ov.style.fontSize = s + 'px';
    ov.style.transform = ''; delete ov.dataset.condense;
    const rects = span ? lineRects(span) : [];
    if (!rects.length) return s;
    const maxw = Math.max(...rects.map(r => r.width));
    if (maxw > ov.clientWidth) {
      const c = Math.max(0.72, ov.clientWidth / maxw);
      ov.style.transform = `scaleX(${c.toFixed(3)})`;
      ov.dataset.condense = c.toFixed(3);
    }
    if (contained(ov, span) && (!ov._contain || ov._contain(
          ov.classList.contains('shaped') ? inkRects(span) : lineRects(span)))) return s;
  }
  return 5;
}

/* every rect corner inside the ellipse inscribed in box er — the visible
   white of a mask (its feather adds a couple px of real white beyond) */
function insideEllipse(rects, er) {
  const a = er.width / 2 + 2, b = er.height / 2 + 2;
  const cx = er.left + er.width / 2, cy = er.top + er.height / 2;
  return rects.every(r =>
    [[r.left, r.top], [r.right, r.top], [r.left, r.bottom], [r.right, r.bottom]]
      .every(([x, y]) => ((x - cx) / a) ** 2 + ((y - cy) / b) ** 2 <= 1));
}

/* every rendered line inside the region's own box — no spill */
function contained(ov, span) {
  if (ov.scrollHeight > ov.clientHeight + 0.5) return false;
  const o = ov.getBoundingClientRect();
  return lineRects(span).every(r =>
    r.top >= o.top - 1 && r.bottom <= o.bottom + 1 &&
    r.left >= o.left - 1 && r.right <= o.right + 1);
}

function showTip(e, text) {
  const tip = $('#orig-tip');
  tip.textContent = text; tip.style.display = 'block';
  const pad = 14;
  let x = e.clientX + pad, y = e.clientY + pad;
  const r = tip.getBoundingClientRect();
  if (x + r.width > innerWidth - 8) x = e.clientX - r.width - pad;
  if (y + r.height > innerHeight - 8) y = e.clientY - r.height - pad;
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}
function hideTip() { $('#orig-tip').style.display = 'none'; }

/* ---------- export: typeset pages → zip of images ----------
   Each page is laid out offscreen with the exact same overlay code the
   reader uses, then the rendered text lines are read back off the DOM
   and drawn onto a canvas over the cleaned image at native resolution —
   so the file matches what the reader shows, fonts and fits included.
   Pages not fully translated are passed through untouched. */
const EXPORT_W = 840;  // layout width ≈ what the reader displays at, so
                       // the px-tuned fit constants behave identically

async function exportCbz() {
  const btn = $('#dl-btn');
  btn.disabled = true;
  try {
    // make sure the lettering fonts are rasterisable before drawing
    // (font-display:swap would silently paint fallbacks otherwise)
    await Promise.allSettled(
      ['16px "Komika Text"', '16px "Back Issues BB"', '16px "Permanent Marker"']
        .map(f => document.fonts.load(f)));
    const files = [];
    for (let n = 0; n < R.data.page_count; n++) {
      btn.textContent = `${n + 1} / ${R.data.page_count}…`;
      files.push(await renderPageFile(n));
    }
    downloadBlob(makeZip(files), `${R.data.title} [${R.lang}].zip`);
    toast(`exported ${files.length} typeset pages (rename .zip → .cbz for manga readers)`);
  } catch (e) {
    toast('export failed: ' + e.message);
  }
  btn.disabled = false;
  btn.textContent = '⤓ ZIP';
}

const IMG_EXT = { 'image/png': 'png', 'image/webp': 'webp' };
async function renderPageFile(n) {
  const page = R.data.pages[n];
  const blob = await (await fetch(pageSrc(n, true))).blob();
  const name = `page_${String(n + 1).padStart(4, '0')}.` + (IMG_EXT[blob.type] || 'jpg');
  // no full translation to letter in: ship the original bytes untouched
  // (covers letter caption chips over the original art instead)
  if (!useCleaned(n, true) && !(page.cover && fullyTranslated(n)))
    return { name, data: new Uint8Array(await blob.arrayBuffer()) };

  const wrap = document.createElement('div');
  wrap.style.cssText = `position:fixed;left:-10000px;top:0;width:${EXPORT_W}px`;
  const img = document.createElement('img');
  img.style.cssText = 'display:block;width:100%';
  wrap.appendChild(img);
  document.body.appendChild(wrap);
  try {
    await new Promise((res, rej) => {
      img.onload = res; img.onerror = () => rej(new Error(`page ${n + 1} failed to load`));
      img.src = URL.createObjectURL(blob);
    });
    renderOverlays(wrap, n, true);
    const canvas = document.createElement('canvas');
    canvas.width = page.width; canvas.height = page.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(await createImageBitmap(blob), 0, 0, page.width, page.height);
    drawOverlays(ctx, wrap, page.width / img.clientWidth);
    const out = await new Promise(r =>
      canvas.toBlob(r, blob.type === 'image/jpeg' ? 'image/jpeg' : blob.type, 0.95));
    return { name, data: new Uint8Array(await out.arrayBuffer()) };
  } finally {
    URL.revokeObjectURL(img.src);
    wrap.remove();
  }
}

function drawOverlays(ctx, wrap, f) {
  const base = wrap.getBoundingClientRect();
  ctx.save();
  ctx.scale(f, f);
  for (const el of wrap.querySelectorAll('.ov-mask')) {
    // the feathered white mask over un-erased source text (SFX etc.)
    const r = el.getBoundingClientRect();
    ctx.save();
    ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 7;
    ctx.beginPath();
    ctx.ellipse(r.left - base.left + r.width / 2, r.top - base.top + r.height / 2,
                r.width / 2 + 3, r.height / 2 + 3, 0, 0, 2 * Math.PI);
    ctx.fill(); ctx.fill();
    ctx.restore();
  }
  for (const ov of wrap.querySelectorAll('.ov')) drawOv(ctx, ov, base);
  ctx.restore();
}

function drawOv(ctx, ov, base) {
  const span = ov.querySelector('span');
  if (!span || !span.textContent) return;
  if (ov.classList.contains('caption')) {
    // the chip's own rounded white card, under its text
    const r = ov.getBoundingClientRect();
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,.93)';
    ctx.beginPath();
    ctx.roundRect(r.left - base.left, r.top - base.top, r.width, r.height, 6);
    ctx.fill();
    ctx.restore();
  }
  // measure untransformed, then apply the condensation as a canvas
  // transform around the same centre the CSS scaleX uses
  const cond = +(ov.dataset.condense || 1);
  if (cond < 1) ov.style.transform = 'none';
  const ubox = ov.getBoundingClientRect();
  const lines = extractLines(span);
  const cs = getComputedStyle(ov);
  const sfx = ov.classList.contains('sfx');
  ctx.save();
  if (cond < 1) {
    const cx = ubox.left - base.left + ubox.width / 2;
    ctx.translate(cx, 0); ctx.scale(cond, 1); ctx.translate(-cx, 0);
    ov.style.transform = `scaleX(${cond})`;
  }
  // bubble/label lettering is overflow:hidden in the reader — clip the
  // canvas the same way, or exports show spill the reader never does
  if (!sfx && !ov.classList.contains('caption')) {
    ctx.beginPath();
    ctx.rect(ubox.left - base.left, ubox.top - base.top, ubox.width, ubox.height);
    ctx.clip();
  }
  if ('letterSpacing' in ctx)
    ctx.letterSpacing = cs.letterSpacing === 'normal' ? '0px' : cs.letterSpacing;
  ctx.textBaseline = 'middle';
  ctx.fillStyle = cs.color;
  for (const ln of lines) {
    // each run carries its own element: <em> runs draw in bold italic
    const rs = getComputedStyle(ln.el);
    ctx.font = `${rs.fontStyle} ${rs.fontWeight} ${rs.fontSize} ${rs.fontFamily}`;
    const x = ln.x - base.left, y = ln.y - base.top;
    if (sfx) {
      // the CSS text-shadow halo, as a rounded white stroke
      ctx.save();
      ctx.strokeStyle = '#fff'; ctx.lineJoin = 'round';
      ctx.lineWidth = Math.max(3, parseFloat(cs.fontSize) * 0.22);
      ctx.strokeText(ln.text, x, y);
      ctx.restore();
    }
    ctx.fillText(ln.text, x, y);
  }
  ctx.restore();
}

/* the browser's own line breaking, read back: client rect of every
   character, grouped into same-styled runs (an <em> word is its own run
   so the canvas can switch to its bold-italic font) by vertical position */
function extractLines(span) {
  const runs = [];
  const range = document.createRange();
  const walker = document.createTreeWalker(span, NodeFilter.SHOW_TEXT);
  let cur = null;
  for (let node; (node = walker.nextNode()); ) {
    const s = node.textContent, el = node.parentElement;
    for (let i = 0; i < s.length; i++) {
      range.setStart(node, i); range.setEnd(node, i + 1);
      const r = range.getClientRects()[0];
      if (!r || !r.width) continue;  // collapsed whitespace at a break
      if (!cur || el !== cur.el || Math.abs(r.top - cur.top) > r.height / 2) {
        cur = { text: '', el, x: r.left, top: r.top, bottom: r.bottom, right: r.right };
        runs.push(cur);
      } else if (r.left > cur.right + 0.5) {
        cur.text += ' ';  // the collapsed space between words
      }
      cur.text += s[i];
      cur.right = r.right;
      cur.bottom = Math.max(cur.bottom, r.bottom);
    }
  }
  for (const l of runs) l.y = (l.top + l.bottom) / 2;
  return runs;
}

/* store-only zip: pages are already jpeg/png, compression would be noise */
const CRC_T = (() => {
  const t = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
    t[n] = c;
  }
  return t;
})();
function crc32(u8) {
  let c = 0xffffffff;
  for (let i = 0; i < u8.length; i++) c = CRC_T[(c ^ u8[i]) & 0xff] ^ (c >>> 8);
  return (c ^ 0xffffffff) >>> 0;
}
function makeZip(files) {
  const enc = new TextEncoder();
  const parts = [], central = [];
  let off = 0;
  for (const f of files) {
    const name = enc.encode(f.name), crc = crc32(f.data), sz = f.data.length;
    const lh = new DataView(new ArrayBuffer(30));
    lh.setUint32(0, 0x04034b50, true); lh.setUint16(4, 20, true);
    lh.setUint32(14, crc, true);
    lh.setUint32(18, sz, true); lh.setUint32(22, sz, true);
    lh.setUint16(26, name.length, true);
    parts.push(new Uint8Array(lh.buffer), name, f.data);
    const ch = new DataView(new ArrayBuffer(46));
    ch.setUint32(0, 0x02014b50, true);
    ch.setUint16(4, 20, true); ch.setUint16(6, 20, true);
    ch.setUint32(16, crc, true);
    ch.setUint32(20, sz, true); ch.setUint32(24, sz, true);
    ch.setUint16(28, name.length, true);
    ch.setUint32(42, off, true);
    central.push(new Uint8Array(ch.buffer), name);
    off += 30 + name.length + sz;
  }
  const cdSize = central.reduce((a, c) => a + c.length, 0);
  const end = new DataView(new ArrayBuffer(22));
  end.setUint32(0, 0x06054b50, true);
  end.setUint16(8, files.length, true); end.setUint16(10, files.length, true);
  end.setUint32(12, cdSize, true); end.setUint32(16, off, true);
  return new Blob([...parts, ...central, new Uint8Array(end.buffer)],
                  { type: 'application/zip' });
}
function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 60000);
}

/* manga is RTL: left edge / ← = next page */
document.querySelector('.edge.left').onclick = () => nav(+1);
document.querySelector('.edge.right').onclick = () => nav(-1);
$('#back-btn').onclick = closeReader;
$('#dl-btn').onclick = exportCbz;
$('#mode-btn').onclick = toggleMode;
$('#ov-btn').onclick = toggleOv;
$('#bible-btn').onclick = () => $('#bible-drawer').classList.toggle('open');

function toggleOv() {
  $('#reader').classList.toggle('hide-ov');
  $('#ov-btn').classList.toggle('on');
  applyMode();  // cleaned vs original image differs per mode
}
function closeReader() {
  $('#reader').classList.remove('open');
  $('#bible-drawer').classList.remove('open');
  document.body.classList.add('library-mode');
  hideTip();
  loadLibrary();
}

addEventListener('keydown', e => {
  if (!$('#reader').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') nav(+1);
  else if (e.key === 'ArrowRight') nav(-1);
  else if (R.mode === 'strip' && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
    // the strip div is never focused, so scroll it by hand
    $('#strip').scrollBy({ top: (e.key === 'ArrowDown' ? 1 : -1) * innerHeight * 0.8,
                           behavior: 'smooth' });
    e.preventDefault();
  }
  else if (e.key === 't') toggleOv();
  else if (e.key === 'v') toggleMode();
  else if (e.key === 'b') $('#bible-drawer').classList.toggle('open');
  else if (e.key === 'Escape') closeReader();
});
addEventListener('resize', () => {
  if ($('#reader').classList.contains('open'))
    document.querySelectorAll('.ov').forEach(o => o._refit && o._refit());
});
/* the lettering fonts swap in after the first overlays render
   (font-display: swap) with different metrics — refit, or fits and
   masks measured against the fallback font are wrong on first view */
document.fonts.addEventListener('loadingdone', () => {
  document.querySelectorAll('.ov').forEach(o => o._refit && o._refit());
  document.querySelectorAll('#page-wrap, .strip-page')
    .forEach(w => resolveSfxCollisions(w));
});

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

refreshStatus(); loadLibrary();
setInterval(refreshStatus, 15000);
</script>
</body>
</html>
